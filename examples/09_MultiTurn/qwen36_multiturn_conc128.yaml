# Qwen3.6-35B-A3B-FP8 — agentic multi-turn, online concurrency=128.
#
# Saturation point. PR-314 disallows offline + multi_turn (multi-turn requires
# per-conversation sequencing), so the throughput-leaning Pareto point is
# captured here as high-concurrency multi-turn instead of an offline burst.
name: "qwen36-agentic-multiturn-conc128"
version: "1.0"
type: "online"

model_params:
  name: "Qwen/Qwen3.6-35B-A3B-FP8"
  temperature: 1.0
  top_p: 0.95
  max_new_tokens: 20000
  chat_template_kwargs:
    thinking: true
    preserve_thinking: true

datasets:
  - name: agentic_coding_128
    type: performance
    path: /workspace/datasets/subsets/agentic_coding_16.jsonl
    samples: 16
    multi_turn:
      turn_timeout_s: 600.0
      enable_salt: true
      inject_tool_delay: true

settings:
  runtime:
    min_duration_ms: 0

  load_pattern:
    type: multi_turn
    target_concurrency: 128

  client:
    warmup_connections: 0
    max_idle_time: 0.5

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: openai

report_dir: /home/sphoong/qwen36-pareto-results/report
